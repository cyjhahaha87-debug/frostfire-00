<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>frostfire-00</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a1a;
    color: #eee;
    font-family: system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    min-height: 100vh;
  }
  h1 { font-size: 18px; margin-bottom: 10px; color: #aaa; }
  #game {
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }
  canvas {
    background: #0a0a0a;
    image-rendering: pixelated;
    border: 2px solid #333;
  }
  #side {
    width: 280px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  #controls, #chatBox {
    background: #222;
    border: 1px solid #333;
    padding: 12px;
    border-radius: 6px;
  }
  #controls p { font-size: 12px; color: #888; margin: 4px 0; }
  #controls kbd {
    background: #111;
    border: 1px solid #444;
    border-radius: 3px;
    padding: 1px 6px;
    font-size: 11px;
    color: #ccc;
  }
  #me {
    font-size: 13px;
    color: #4ade80;
    margin-top: 8px;
    word-break: break-all;
  }
  #chatLog {
    height: 240px;
    overflow-y: auto;
    background: #111;
    padding: 8px;
    font-size: 12px;
    line-height: 1.5;
    border: 1px solid #333;
    border-radius: 4px;
    margin-bottom: 8px;
  }
  #chatLog .sys { color: #888; font-style: italic; }
  #chatLog .msg { color: #ddd; }
  #chatLog .nick { color: #60a5fa; font-weight: bold; }
  #chatInputRow {
    display: flex;
    gap: 4px;
  }
  #chatInput, #nickInput {
    flex: 1;
    background: #111;
    color: #eee;
    border: 1px solid #444;
    padding: 6px 8px;
    font-size: 13px;
    border-radius: 3px;
  }
  button {
    background: #2563eb;
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 13px;
  }
  button:hover { background: #1d4ed8; }
  #nickRow {
    display: flex;
    gap: 4px;
    margin-bottom: 8px;
  }
</style>
</head>
<body>
  <h1>frostfire-00 — expedition 형식 MMO 실험</h1>
  <div id="game">
    <canvas id="canvas" width="960" height="720"></canvas>
    <div id="side">
      <div id="controls">
        <p><kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> 또는 <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 이동</p>
        <p>엔터로 채팅</p>
        <div id="me">연결 중...</div>
      </div>
      <div id="chatBox">
        <div id="nickRow">
          <input id="nickInput" type="text" placeholder="새 닉네임" maxlength="20">
          <button id="nickBtn">변경</button>
        </div>
        <div id="chatLog"></div>
        <div id="chatInputRow">
          <input id="chatInput" type="text" placeholder="채팅..." maxlength="200">
          <button id="chatBtn">전송</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
