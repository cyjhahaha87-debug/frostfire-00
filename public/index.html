<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MMO Test · 채팅</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a1a; color: white; font-family: 'Malgun Gothic', sans-serif; overflow: hidden; height: 100vh; }
  #layout { display: flex; height: 100vh; }
  
  #game-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
  #info { position: absolute; top: 10px; left: 10px; font-family: monospace; font-size: 13px; color: #aaa; }
  canvas { background: #2a2a2a; border: 1px solid #444; }
  
  #chat-panel {
    width: 320px;
    background: #141414;
    border-left: 1px solid #333;
    display: flex;
    flex-direction: column;
  }
  #chat-header {
    padding: 12px 16px;
    border-bottom: 1px solid #333;
    font-size: 14px;
    color: #c9a962;
    letter-spacing: 2px;
  }
  #chat-log {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    font-size: 13px;
    line-height: 1.6;
  }
  #chat-log::-webkit-scrollbar { width: 4px; }
  #chat-log::-webkit-scrollbar-track { background: #141414; }
  #chat-log::-webkit-scrollbar-thumb { background: #444; }
  
  .msg { padding: 3px 0; word-wrap: break-word; }
  .msg-system { color: #777; font-style: italic; font-size: 12px; }
  .msg-nick { font-weight: bold; margin-right: 6px; }
  .msg-text { color: #ddd; }
  
  #chat-input-area {
    border-top: 1px solid #333;
    padding: 10px;
    display: flex;
    gap: 6px;
  }
  #chat-input {
    flex: 1;
    background: #222;
    border: 1px solid #444;
    color: white;
    padding: 8px 12px;
    font-family: inherit;
    font-size: 13px;
    outline: none;
  }
  #chat-input:focus { border-color: #c9a962; }
  #chat-send {
    background: #c9a962;
    border: none;
    color: #141414;
    padding: 8px 14px;
    cursor: pointer;
    font-family: inherit;
    font-weight: bold;
  }
  #chat-send:hover { background: #d4b872; }
  
  #nick-area {
    padding: 8px 10px;
    border-top: 1px solid #333;
    display: flex;
    gap: 6px;
    align-items: center;
    font-size: 12px;
    color: #888;
  }
  #nick-input {
    flex: 1;
    background: #222;
    border: 1px solid #444;
    color: white;
    padding: 5px 10px;
    font-family: inherit;
    font-size: 12px;
    outline: none;
  }
  #nick-btn {
    background: #333;
    border: 1px solid #555;
    color: #ccc;
    padding: 5px 10px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
  }
  #nick-btn:hover { background: #444; }
</style>
</head>
<body>

<div id="layout">
  <div id="game-area">
